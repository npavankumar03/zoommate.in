<!DOCTYPE html>
<html lang="en" style="background: transparent;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zoommate</title>
    <style>
      /* Critical: both html and body must be transparent so the OS
         desktop shows through regions we don't paint. */
      html, body {
        margin: 0;
        padding: 0;
        background: transparent !important;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
      }
      /* Give #root a visible background so the window is always findable
         even if React fails to mount. React components paint over this. */
      #root {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: rgba(8, 8, 18, 0.95);
        min-height: 100vh;
        min-width: 100vw;
        user-select: none;
        -webkit-user-select: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
